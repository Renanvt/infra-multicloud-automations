version: "3.8"

services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    environment:
      NODE_ENV: "production"
      TZ: "America/Sao_Paulo"
      MAIN_URL: "https://postiz2.alobexpress.com.br"
      FRONTEND_URL: "https://postiz2.alobexpress.com.br"
      NEXT_PUBLIC_BACKEND_URL: "https://postiz2.alobexpress.com.br/api"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      JWT_SECRET: "74c530157e7df55a1b6edd0af9dc2cbbaa052e6a7fe7e3fc22028d8d12928138"
      DATABASE_URL: "postgresql://postgres:b7ac07bdae3451b6f29f06983b934e80a7cd98a28222d4a0@postgres_postgres:5432/postiz2"
      REDIS_URL: "redis://:920ac7d1b50e9e3b2fde74857c3e6e9febea9ee6c88984aa@redis:6379"
      TEMPORAL_ADDRESS: "temporal:7233"
      TEMPORAL_NAMESPACE: "default"
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "false"
      RUN_CRON: "true"
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"
      API_LIMIT: "30"
      NX_ADD_PLUGINS: "false"
      TRUST_PROXY: "true"

      # Add only the providers used by this second installation.
      FACEBOOK_APP_ID: ""
      FACEBOOK_APP_SECRET: ""
      INSTAGRAM_APP_ID: ""
      INSTAGRAM_APP_SECRET: ""
      YOUTUBE_CLIENT_ID: ""
      YOUTUBE_CLIENT_SECRET: ""
      PINTEREST_CLIENT_ID: ""
      PINTEREST_CLIENT_SECRET: ""
      THREADS_APP_ID: ""
      THREADS_APP_SECRET: ""
      OPENAI_API_KEY: ""

    volumes:
      - postiz2_uploads:/uploads
      - postiz2_config:/config
    networks:
      - network_swarm_public
      - network_postiz2_internal
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        reservations:
          cpus: "0.25"
          memory: 512M
        limits:
          cpus: "1.50"
          memory: 2048M
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 10
        window: 120s
      update_config:
        parallelism: 1
        delay: 30s
        order: stop-first
        failure_action: rollback
      labels:
        traefik.enable: "true"
        traefik.swarm.network: "network_swarm_public"
        traefik.http.routers.postiz2.rule: "Host(`postiz2.alobexpress.com.br`)"
        traefik.http.routers.postiz2.entrypoints: "websecure"
        traefik.http.routers.postiz2.tls.certresolver: "letsencryptresolver"
        traefik.http.routers.postiz2.service: "postiz2"
        traefik.http.services.postiz2.loadbalancer.server.port: "5000"
        traefik.http.services.postiz2.loadbalancer.passHostHeader: "true"
    healthcheck:
      test: ["CMD", "node", "-e", "const r=require('http').get('http://localhost:5000/',res=>process.exit(res.statusCode<500?0:1));r.on('error',()=>process.exit(1));r.setTimeout(4000,()=>{r.destroy();process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - 920ac7d1b50e9e3b2fde74857c3e6e9febea9ee6c88984aa
    volumes:
      - postiz2_redis:/data
    networks:
      - network_postiz2_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '920ac7d1b50e9e3b2fde74857c3e6e9febea9ee6c88984aa' ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    environment:
      TZ: "America/Sao_Paulo"
      discovery.type: "single-node"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
      xpack.security.enabled: "false"
      cluster.routing.allocation.disk.threshold_enabled: "true"
      cluster.routing.allocation.disk.watermark.low: "512mb"
      cluster.routing.allocation.disk.watermark.high: "256mb"
      cluster.routing.allocation.disk.watermark.flood_stage: "128mb"
    volumes:
      - postiz2_elasticsearch:/usr/share/elasticsearch/data
    networks:
      - network_postiz2_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        reservations:
          memory: 384M
        limits:
          cpus: "0.75"
          memory: 768M
      restart_policy:
        condition: on-failure
        delay: 10s
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  temporal:
    image: temporalio/auto-setup:1.28.1
    environment:
      TZ: "America/Sao_Paulo"
      DB: "postgres12"
      DB_PORT: "5432"
      POSTGRES_USER: "postgres"
      POSTGRES_PWD: "b7ac07bdae3451b6f29f06983b934e80a7cd98a28222d4a0"
      POSTGRES_SEEDS: "postgres_postgres"
      DBNAME: "postiz2_temporal"
      VISIBILITY_DBNAME: "postiz2_temporal_visibility"
      DYNAMIC_CONFIG_FILE_PATH: "config/dynamicconfig/development-sql.yaml"
      ENABLE_ES: "true"
      ES_SEEDS: "temporal-elasticsearch"
      ES_VERSION: "v7"
    volumes:
      - /opt/infra/alobexpress/postiz2/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    networks:
      - network_swarm_public
      - network_postiz2_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        reservations:
          memory: 384M
        limits:
          cpus: "0.75"
          memory: 768M
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 10
        window: 120s

volumes:
  postiz2_uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/infra/alobexpress/postiz2/uploads
  postiz2_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/infra/alobexpress/postiz2/config
  postiz2_redis:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/infra/alobexpress/postiz2/redis
  postiz2_elasticsearch:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/infra/alobexpress/postiz2/elasticsearch

networks:
  network_swarm_public:
    external: true
    name: network_swarm_public
  network_postiz2_internal:
    driver: overlay
    internal: true
    attachable: true
    name: network_postiz2_internal
