version: "3.7"

services:

  # ─── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest

    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "SENHA_AQUI"
      GF_SERVER_ROOT_URL: "https://grafana.seudominio.com.br"
      GF_SERVER_DOMAIN: "grafana.seudominio.com.br"
      GF_USERS_ALLOW_SIGN_UP: "false"

    volumes:
      - grafana_data:/var/lib/grafana

    networks:
      - network_swarm_public

    deploy:
      mode: replicated
      replicas: 1

      placement:
        constraints:
          - node.role == manager

      resources:
        reservations:
          cpus: "0.25"
          memory: 256M
        limits:
          cpus: "1.0"
          memory: 512M

      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

      labels:
        traefik.enable: "true"
        traefik.swarm.network: "network_swarm_public"
        traefik.http.routers.grafana.rule: "Host(`grafana.seudominio.com.br`)"
        traefik.http.routers.grafana.entrypoints: "websecure"
        traefik.http.routers.grafana.priority: "1"
        traefik.http.routers.grafana.tls.certresolver: "letsencryptresolver"
        traefik.http.routers.grafana.service: "grafana"
        traefik.http.services.grafana.loadbalancer.server.port: "3000"

volumes:
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/infra/{nome-do-negocio}/grafana/data

networks:
  network_swarm_public:
    external: true
    name: network_swarm_public
